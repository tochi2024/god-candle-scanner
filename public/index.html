<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Intel Pro | Intelligence Terminal</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f8f9fa;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --text-main: #1a1d21;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000;
                --bg-sidebar: #0f1115;
                --bg-card: #161a1e;
                --bg-input: #000000;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --border: #262c35;
                --accent: #34d399;
                --danger: #fb7185;
                --warning: #fbbf24;
                --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            }
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: var(--bg-sidebar);
            overflow-y: auto;
        }

        #main-view { flex-grow: 1; background: var(--bg-main); position: relative; }
        
        h1 { font-size: 1.25rem; font-weight: 800; margin: 0 0 20px 0; color: var(--accent); letter-spacing: -0.05em; }
        
        .controls {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            flex-grow: 1;
            font-size: 14px;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: 100%; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        .card:hover { border-color: var(--accent); transform: translateY(-1px); }
        .card.active { border-color: var(--accent); background: var(--bg-sidebar); ring: 2px var(--accent); }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 15px; }
        
        .status-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 900;
            padding: 3px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .conclusion {
            font-size: 12px;
            line-height: 1.5;
            background: rgba(120, 120, 120, 0.08);
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            border-left: 4px solid var(--border);
            font-style: italic;
        }

        .metrics { font-size: 12px; color: var(--text-muted); display: flex; gap: 15px; }
        .metrics b { color: var(--text-main); }

        #progress-container { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 15px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }
        #chart-container { width: 100%; height: 100%; }
        .empty-chart { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>WHALE INTEL 30</h1>
        <div class="controls">
            <div class="search-row">
                <input type="text" id="symbolInput" placeholder="Symbol (e.g. RAVE)">
                <button onclick="manualScan()">SEARCH</button>
            </div>
            <button class="btn-outline" onclick="startFullScan()">FIND TOP 30 SIGNALS</button>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="status" style="font-size: 11px; color: var(--text-muted); margin-bottom: 15px;">Scanner Ready</div>
        <div id="results"></div>
    </div>

    <div id="main-view">
        <div id="chart-container" class="empty-chart">Select a token to view the 30D Macro Chart</div>
    </div>

    <script>
        const THEME = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        let totalFound = 0;

        async function startFullScan() {
            const resDiv = document.getElementById('results');
            const progress = document.getElementById('progress-bar');
            const status = document.getElementById('status');
            
            resDiv.innerHTML = "";
            totalFound = 0;
            progress.style.width = "0%";
            
            let currentIdx = 0;
            const chunkSize = 30; // Scans 30 at a time for more accurate stopping
            const maxIdx = 600; // Hard stop safety limit

            // Logic: Keep scanning until we find 30 tokens that are NOT neutral
            while (totalFound < 30 && currentIdx < maxIdx) {
                status.innerText = `Searching... Found ${totalFound}/30 (Scanning Ranks ${currentIdx+50}-${currentIdx+50+chunkSize})`;
                
                try {
                    const response = await fetch(`/api/scan?start=${currentIdx}&end=${currentIdx + chunkSize}`);
                    const data = await response.json();
                    
                    if (data.length > 0) {
                        renderResults(data);
                        totalFound += data.length;
                    }
                    
                    currentIdx += chunkSize;
                    progress.style.width = (totalFound / 30 * 100) + "%";
                } catch (e) { 
                    console.error("Batch failed", e);
                    break;
                }
            }
            
            progress.style.width = "100%";
            status.innerText = totalFound >= 30 
                ? "Target achieved: Top 30 signals identified." 
                : `Scan ended. Found ${totalFound} signals within the top 600 tokens.`;
        }

        async function manualScan() {
            const sym = document.getElementById('symbolInput').value.trim();
            if(!sym) return;
            document.getElementById('status').innerText = `Searching ${sym}...`;
            const response = await fetch(`/api/scan?symbol=${sym}`);
            const data = await response.json();
            renderResults(data, true);
        }

        function renderResults(data, prepend = false) {
            const resDiv = document.getElementById('results');
            data.forEach(coin => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => loadChart(coin.symbol, div);
                
                let badgeStyle = `background: var(--text-muted); color: #fff;`;
                if(coin.status.includes('ACCUMULATION')) badgeStyle = `background: var(--accent); color: #000;`;
                if(coin.status.includes('DISTRIBUTION')) badgeStyle = `background: var(--danger); color: #fff;`;
                if(coin.status.includes('SPIKE')) badgeStyle = `background: var(--warning); color: #000;`;

                div.innerHTML = `
                    <div class="card-header">
                        <span>${coin.symbol}/USDT</span>
                        <span style="color:var(--text-muted)">$${coin.price}</span>
                    </div>
                    <span class="status-badge" style="${badgeStyle}">${coin.status}</span>
                    <div class="metrics">
                        <span>Vol: <b>${coin.volatility}</b></span>
                        <span>Money Flow: <b>${coin.adScore}</b></span>
                    </div>
                    <div class="conclusion"><strong>Conclusion:</strong> ${coin.explanation}</div>
                `;
                if(prepend) resDiv.prepend(div); else resDiv.appendChild(div);
            });
        }

        function loadChart(symbol, element) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            new TradingView.widget({
                "autosize": true,
                "symbol": "MEXC:" + symbol + "USDT.P",
                "interval": "D",
                "theme": THEME,
                "style": "1",
                "container_id": "chart-container",
                "hide_side_toolbar": false,
                "allow_symbol_change": true
            });
        }
    </script>
</body>
</html>
