<!DOCTYPE html>
<html>
<head>
    <title>God Candle Scanner</title>
    <style>
        body { background: #0b0e11; color: #00ff88; font-family: 'Courier New', monospace; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { border: 1px solid #2b2f36; padding: 20px; border-radius: 12px; background: #181a20; transition: 0.3s; }
        .card:hover { border-color: #00ff88; transform: translateY(-5px); }
        .fire { border: 2px solid #ffaa00; box-shadow: 0 0 15px rgba(255, 170, 0, 0.3); }
        .fire h3 { color: #ffaa00; }
        button { background: #00ff88; color: #000; border: none; padding: 18px 40px; font-weight: 900; cursor: pointer; border-radius: 8px; font-size: 16px; margin-bottom: 30px; }
        a { color: #00ff88; text-decoration: none; font-size: 12px; border: 1px solid #00ff88; padding: 5px; border-radius: 4px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>MEXC WHALE SCANNER</h1>
    <p>Detecting "Coiled Springs" before the God Candle.</p>
    <button onclick="runScan()">SCAN FOR ACCUMULATION</button>
    <div class="grid" id="results"></div>

    <script>
        async function runScan() {
            const btn = document.querySelector('button');
            const resDiv = document.getElementById('results');
            btn.innerText = "SCANNING MEXC FUTURES...";
            resDiv.innerHTML = "";

            try {
                const response = await fetch('/api/scan');
                const data = await response.json();
                
                if(data.length === 0) {
                    resDiv.innerHTML = "No patterns found right now. Try again in 1 hour.";
                }

                data.forEach(coin => {
                    const div = document.createElement('div');
                    div.className = `card ${coin.volumeAlert.includes('🔥') ? 'fire' : ''}`;
                    div.innerHTML = `
                        <h3>${coin.symbol}</h3>
                        <p>Volatility: ${coin.volatility} (Low)</p>
                        <p>Status: ${coin.volumeAlert}</p>
                        <p>Price: $${coin.price}</p>
                        <a href="${coin.link}" target="_blank">OPEN CHART</a>
                    `;
                    resDiv.appendChild(div);
                });
            } catch (e) { 
                alert("Scan failed. Error: " + e.message); 
            }
            btn.innerText = "SCAN FOR ACCUMULATION";
        }
    </script>
</body>
</html>
