<!-- Inside the style tag, add this specific style for the explanation text -->
<style>
    /* ... existing styles ... */
    .conclusion {
        font-size: 12px;
        line-height: 1.5;
        background: rgba(0,0,0,0.05);
        padding: 10px;
        border-radius: 6px;
        margin-top: 12px;
        border-left: 3px solid var(--border);
        color: var(--text-main);
        font-style: italic;
    }
    @media (prefers-color-scheme: dark) {
        .conclusion { background: rgba(255,255,255,0.05); }
    }
</style>

<!-- Inside the renderResults function, update the div.innerHTML -->
<script>
    function renderResults(data, prepend = false) {
        const resDiv = document.getElementById('results');
        data.forEach(coin => {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => loadChart(coin.symbol, div);
            
            let badgeStyle = `background: var(--text-muted); color: #fff;`;
            if(coin.status.includes('ACCUMULATION')) badgeStyle = `background: var(--accent); color: #000;`;
            if(coin.status.includes('DISTRIBUTION')) badgeStyle = `background: var(--danger); color: #fff;`;
            if(coin.status.includes('SPIKE')) badgeStyle = `background: var(--warning); color: #000;`;

            div.innerHTML = `
                <div class="card-header">
                    <span class="symbol">${coin.symbol}/USDT</span>
                    <span class="price">$${coin.price}</span>
                </div>
                <span class="status-badge" style="${badgeStyle}">${coin.status}</span>
                <div class="metrics">
                    <span>Vol: <b>${coin.volatility}</b></span>
                    <span>Money Flow: <b>${coin.adScore}</b></span>
                </div>
                <!-- THE NEW CONCISE CONCLUSION -->
                <div class="conclusion">
                    <strong>Conclusion:</strong> ${coin.explanation}
                </div>
            `;
            if(prepend) resDiv.prepend(div); else resDiv.appendChild(div);
        });
    }
</script>
