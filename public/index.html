<!DOCTYPE html>
<html>
<head>
    <title>God Candle Scanner</title>
    <!-- Include TradingView Library -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: #0b0e11; color: #00ff88; font-family: monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; border-right: 1px solid #2b3139; padding: 20px; overflow-y: auto; background: #181a20; }
        #main-view { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        .card { border: 1px solid #2b2f36; padding: 15px; margin-bottom: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .card:hover { background: #2b3139; border-color: #00ff88; }
        .active-card { border-color: #00ff88; background: #2b3139; }
        .fire { border-left: 5px solid #ffaa00; }
        button { background: #00ff88; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        #chart-container { flex-grow: 1; width: 100%; height: 100%; }
        .no-chart { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>RAVE SCANNER</h2>
        <button onclick="runScan()">SCAN MID-CAPS</button>
        <div id="results"></div>
    </div>

    <div id="main-view">
        <div id="chart-container">
            <div class="no-chart">Click a coin on the left to see the 1D Chart</div>
        </div>
    </div>

    <script>
        async function runScan() {
            const btn = document.querySelector('button');
            const resDiv = document.getElementById('results');
            btn.innerText = "SEARCHING...";
            resDiv.innerHTML = "";

            try {
                const response = await fetch('/api/scan');
                const data = await response.json();
                
                data.sort((a, b) => parseFloat(a.volatility) - parseFloat(b.volatility)); // Sort by lowest vol

                data.forEach(coin => {
                    const div = document.createElement('div');
                    div.className = `card ${coin.status.includes('🔥') ? 'fire' : ''}`;
                    div.onclick = () => loadChart(coin.symbol, div);
                    div.innerHTML = `
                        <strong>${coin.symbol}USDT</strong><br>
                        <small>Volatilty: ${coin.volatility}</small><br>
                        <small style="color:${coin.status.includes('🔥') ? '#ffaa00' : '#888'}">${coin.status}</small>
                    `;
                    resDiv.appendChild(div);
                });
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "SCAN MID-CAPS";
        }

        function loadChart(symbol, element) {
            // Highlight active card
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
            element.classList.add('active-card');

            // Load TradingView Widget
            new TradingView.widget({
                "autosize": true,
                "symbol": "MEXC:" + symbol + "USDT.P",
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "chart-container"
            });
        }
    </script>
</body>
</html>
