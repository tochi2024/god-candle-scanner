<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Intel Pro | Macro Scanner</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f8f9fa;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --text-main: #1a1d21;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000;
                --bg-sidebar: #0f1115;
                --bg-card: #161a1e;
                --bg-input: #000000;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --border: #262c35;
                --accent: #34d399;
                --danger: #fb7185;
                --warning: #fbbf24;
                --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            }
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: var(--bg-sidebar);
            overflow-y: auto;
        }

        #main-view { flex-grow: 1; background: var(--bg-main); position: relative; }
        h1 { font-size: 1.25rem; font-weight: 800; margin: 0 0 20px 0; color: var(--accent); }
        
        .controls {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            flex-grow: 1;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: 100%; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        .card:hover { border-color: var(--accent); }
        .card.active { border-color: var(--accent); background: var(--bg-sidebar); }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: 700; }
        
        .status-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .conclusion {
            font-size: 12px;
            line-height: 1.4;
            background: rgba(100, 100, 100, 0.05);
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 3px solid var(--border);
        }

        #progress-bar { height: 4px; background: var(--accent); width: 0%; transition: 0.3s; margin-bottom: 10px; }
        #chart-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>WHALE INTEL 300</h1>
        <div class="controls">
            <div class="search-row">
                <input type="text" id="symbolInput" placeholder="Symbol (e.g. RAVE)">
                <button onclick="manualScan()">GO</button>
            </div>
            <button class="btn-outline" onclick="startFullScan()">SCAN MARKET</button>
        </div>
        <div id="progress-bar"></div>
        <div id="status" style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px;">Ready</div>
        <div id="results"></div>
    </div>

    <div id="main-view">
        <div id="chart-container"></div>
    </div>

    <script>
        const THEME = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

        async function startFullScan() {
            const resDiv = document.getElementById('results');
            const progress = document.getElementById('progress-bar');
            resDiv.innerHTML = "";
            
            for (let i = 0; i < 300; i += 50) {
                try {
                    const response = await fetch(`/api/scan?start=${i}&end=${i + 50}`);
                    const data = await response.json();
                    renderResults(data);
                    progress.style.width = ((i + 50) / 300 * 100) + "%";
                } catch (e) { console.error(e); }
            }
        }

        async function manualScan() {
            const sym = document.getElementById('symbolInput').value.trim();
            if(!sym) return;
            const response = await fetch(`/api/scan?symbol=${sym}`);
            const data = await response.json();
            renderResults(data, true);
        }

        function renderResults(data, prepend = false) {
            const resDiv = document.getElementById('results');
            data.forEach(coin => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => loadChart(coin.symbol, div);
                
                div.innerHTML = `
                    <div class="card-header">
                        <span>${coin.symbol}/USDT</span>
                        <span style="color:var(--text-muted)">$${coin.price}</span>
                    </div>
                    <span class="status-badge" style="background:${coin.color}; color:#000;">${coin.status}</span>
                    <div style="font-size:11px; color:var(--text-muted)">Vol: ${coin.volatility} | MF: ${coin.adScore}</div>
                    <div class="conclusion"><strong>Conclusion:</strong> ${coin.explanation}</div>
                `;
                if(prepend) resDiv.prepend(div); else resDiv.appendChild(div);
            });
        }

        function loadChart(symbol, element) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            new TradingView.widget({
                "autosize": true,
                "symbol": "MEXC:" + symbol + "USDT.P",
                "interval": "D",
                "theme": THEME,
                "style": "1",
                "container_id": "chart-container"
            });
        }
    </script>
</body>
</html>
