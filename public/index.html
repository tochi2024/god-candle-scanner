<!DOCTYPE html>
<html>
<head>
    <title>Whale Intel Macro Scanner</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: #0b0e11; color: #fff; font-family: monospace; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 380px; border-right: 1px solid #2b3139; padding: 15px; display: flex; flex-direction: column; background: #121418; }
        #main-view { flex-grow: 1; background: #000; }
        .controls { background: #181a20; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2b3139; }
        input { background: #000; border: 1px solid #333; color: #00ff88; padding: 10px; width: 60%; border-radius: 4px; }
        button { background: #00ff88; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 10px; }
        #results { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .card { border: 1px solid #2b2f36; padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; }
        .card:hover { border-color: #00ff88; background: #1c1f25; }
        .active-card { border-color: #00ff88 !important; background: #1c1f25; }
        #chart-container { width: 100%; height: 100%; }
        #progress-bar { height: 4px; background: #00ff88; width: 0%; transition: 0.3s; margin-bottom: 10px; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color:#00ff88; margin: 0 0 15px 0">WHALE INTEL 300</h2>
        <div class="controls">
            <input type="text" id="symbolInput" placeholder="Symbol (RAVE)">
            <button onclick="manualScan()" style="width:30%; margin:0; float:right">GO</button>
            <button onclick="startFullScan()">SCAN MARKET (300 TOKENS)</button>
        </div>
        <div id="progress-bar"></div>
        <div id="status" style="font-size:11px; color:#666">Ready</div>
        <div id="results"></div>
    </div>

    <div id="main-view">
        <div id="chart-container"></div>
    </div>

    <script>
        // Use a loop to scan in chunks of 50 to avoid Vercel Timeouts
        async function startFullScan() {
            const resDiv = document.getElementById('results');
            const status = document.getElementById('status');
            const progress = document.getElementById('progress-bar');
            
            resDiv.innerHTML = "";
            progress.style.width = "0%";
            
            const totalToScan = 300;
            const chunkSize = 50;

            for (let i = 0; i < totalToScan; i += chunkSize) {
                const start = i;
                const end = i + chunkSize;
                status.innerText = `Scanning tokens ${start} to ${end}...`;
                
                try {
                    const response = await fetch(`/api/scan?start=${start}&end=${end}`);
                    const data = await response.json();
                    renderResults(data);
                    
                    const percent = ((end / totalToScan) * 100);
                    progress.style.width = percent + "%";
                } catch (e) {
                    console.error("Chunk failed", e);
                }
            }
            status.innerText = "Scan Complete.";
        }

        async function manualScan() {
            const sym = document.getElementById('symbolInput').value;
            if(!sym) return;
            const response = await fetch(`/api/scan?symbol=${sym}`);
            const data = await response.json();
            renderResults(data, true);
        }

        function renderResults(data, prepend = false) {
            const resDiv = document.getElementById('results');
            data.forEach(coin => {
                const div = document.createElement('div');
                div.className = `card`;
                div.onclick = () => loadChart(coin.symbol, div);
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <strong>${coin.symbol}USDT</strong>
                        <span style="color:#888">$${coin.price}</span>
                    </div>
                    <div style="color:${coin.color}; font-size:10px; font-weight:bold; margin-top:5px">${coin.status}</div>
                    <div style="font-size:10px; color:#444; margin-top:4px">Vol: ${coin.volatility} | MF: ${coin.adScore}</div>
                `;
                if(prepend) resDiv.prepend(div); else resDiv.appendChild(div);
            });
        }

        function loadChart(symbol, element) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
            element.classList.add('active-card');
            new TradingView.widget({
                "autosize": true,
                "symbol": "MEXC:" + symbol + "USDT.P",
                "interval": "D",
                "theme": "dark",
                "style": "1",
                "container_id": "chart-container"
            });
        }
    </script>
</body>
</html>
