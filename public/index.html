<!DOCTYPE html>
<html>
<head>
    <title>Whale Intel Macro Scanner</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: #0b0e11; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 400px; border-right: 1px solid #2b3139; padding: 15px; overflow-y: auto; background: #121418; display: flex; flex-direction: column; }
        #main-view { flex-grow: 1; background: #000; }
        .controls { background: #181a20; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input { background: #000; border: 1px solid #333; color: #00ff88; padding: 10px; width: 60%; border-radius: 4px; outline: none; }
        button { background: #00ff88; color: #000; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .results-container { flex-grow: 1; overflow-y: auto; }
        .card { border: 1px solid #2b2f36; padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .card:hover { border-color: #00ff88; background: #1c1f25; }
        .active-card { border-color: #00ff88 !important; background: #1c1f25; box-shadow: 0 0 10px rgba(0,255,136,0.1); }
        .badge { font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 10px; margin-top: 5px; display: inline-block; text-transform: uppercase; }
        #chart-container { width: 100%; height: 100%; }
        .loader { color: #888; font-size: 12px; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color:#00ff88; margin-top:0">WHALE INTEL PRO</h2>
        
        <div class="controls">
            <input type="text" id="symbolInput" placeholder="Symbol (e.g. BTC)">
            <button onclick="manualScan()">SEARCH</button>
            <button onclick="runScan()" style="width:100%; margin-top:10px">SCAN 300 TOKENS (HIGH/MID)</button>
        </div>

        <div id="status" class="loader">Idle</div>
        <div class="results-container" id="results"></div>
    </div>

    <div id="main-view">
        <div id="chart-container"></div>
    </div>

    <script>
        async function runScan(manualSymbol = "") {
            const resDiv = document.getElementById('results');
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = manualSymbol ? "Hunting for " + manualSymbol + "..." : "Scanning entire market (300 pairs)...";
            
            try {
                const url = manualSymbol ? `/api/scan?symbol=${manualSymbol}` : '/api/scan';
                const response = await fetch(url);
                const data = await response.json();
                
                if (!manualSymbol) resDiv.innerHTML = ""; 

                // Sort by Accumulation status first
                data.sort((a,b) => (a.status === '💎 ACCUMULATION' ? -1 : 1));

                data.forEach(coin => {
                    const div = document.createElement('div');
                    div.className = `card`;
                    div.onclick = () => loadChart(coin.symbol, div);
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <strong>${coin.symbol}USDT</strong>
                            <span style="color:#888">$${coin.price}</span>
                        </div>
                        <div class="badge" style="border: 1px solid ${coin.color}; color: ${coin.color}">
                            ${coin.status}
                        </div>
                        <div style="font-size:10px; color:#555; margin-top:5px">
                            Volatility: ${coin.volatility} | Money Flow: ${coin.adScore}
                        </div>
                    `;
                    resDiv.prepend(div);
                });
                statusDiv.innerText = `Scan Finished. ${data.length} Signals found.`;
            } catch (e) { statusDiv.innerText = "Timeout. Try Scanning in 30 seconds."; }
        }

        function manualScan() {
            const sym = document.getElementById('symbolInput').value;
            if(sym) runScan(sym);
        }

        function loadChart(symbol, element) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
            element.classList.add('active-card');

            new TradingView.widget({
                "autosize": true,
                "symbol": "MEXC:" + symbol + "USDT.P",
                "interval": "D",
                "theme": "dark",
                "style": "1",
                "container_id": "chart-container"
            });
        }
    </script>
</body>
</html>
