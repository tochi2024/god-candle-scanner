<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Intel Pro | Intelligence Terminal</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-main: #ffffff; --bg-sidebar: #f8f9fa; --bg-card: #ffffff;
            --text-main: #1a1d21; --text-muted: #64748b; --border: #e2e8f0;
            --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; --pump: #d400ff; --extreme: #ff8800; --steady: #00e5ff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000; --bg-sidebar: #0f1115; --bg-card: #161a1e;
                --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #262c35;
            }
        }
        body { background: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 380px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; background: var(--bg-sidebar); overflow-y: auto; }
        #main-view { flex-grow: 1; background: #000; position: relative; }
        h1 { font-size: 1rem; font-weight: 900; color: var(--accent); margin: 0 0 15px 0; text-transform: uppercase; }
        .controls { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 8px; flex-grow: 1; font-size: 13px; }
        button { border: none; padding: 10px; font-weight: 700; border-radius: 8px; cursor: pointer; font-size: 10px; width: 100%; text-transform: uppercase; }
        .btn-acc { background: var(--accent); color: #000; }
        .btn-dist { background: var(--danger); color: #fff; }
        .btn-pump { background: var(--pump); color: #fff; }
        .btn-steady { background: var(--steady); color: #000; }
        .btn-search { background: var(--text-main); color: var(--bg-main); width: auto; }

        .card { background: var(--bg-card); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .card.active { border-color: var(--accent); background: var(--bg-sidebar); border-width: 2px; }
        .badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; margin: 8px 0; display: inline-block; }
        .metrics-row { display: flex; gap: 15px; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin: 8px 0; }
        .metrics-row b { color: var(--text-main); }
        .strength-bar-bg { background: var(--border); height: 4px; border-radius: 2px; overflow: hidden; margin: 6px 0; }
        .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; background: rgba(120,120,120,0.06); padding: 10px; border-radius: 8px; }
        .plan-item { font-size: 11px; color: var(--text-muted); }
        .plan-item b { color: var(--text-main); display: block; font-size: 13px; }

        .steady-report { background: rgba(0, 229, 255, 0.1); border: 1px solid var(--steady); padding: 12px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .steady-val { color: var(--steady); font-weight: 900; font-size: 18px; display: block; }

        #progress-bar { height: 4px; background: var(--accent); width: 0%; transition: 0.3s; margin-bottom: 10px; }
        #chart-container { width: 100%; height: 100%; }
        .conclusion { font-size: 11px; font-style: italic; color: var(--text-muted); margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>Whale Intelligence</h1>
        <div class="controls">
            <div class="row">
                <input type="text" id="symbolInput" placeholder="Symbol (RAVE)">
                <button class="btn-search" onclick="manualScan()">GO</button>
            </div>
            <div class="row">
                <button class="btn-acc" onclick="startFullScan('acc')">ACCUMULATION</button>
                <button class="btn-dist" onclick="startFullScan('dist')">DISTRIBUTION</button>
            </div>
            <div class="row">
                <button class="btn-pump" onclick="startFullScan('pump')">20D HIGHS</button>
                <button class="btn-steady" onclick="startFullScan('steady')">STEADY TREND (1H)</button>
            </div>
        </div>
        <div id="progress-bar"></div>
        <div id="status" style="font-size: 11px; color: var(--text-muted); margin-bottom: 15px">Awaiting mode...</div>
        <div id="results"></div>
    </div>
    <div id="main-view"><div id="chart-container"></div></div>

    <script>
        const THEME = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        let totalFound = 0;

        async function startFullScan(mode) {
            const resDiv = document.getElementById('results');
            const progress = document.getElementById('progress-bar');
            const status = document.getElementById('status');
            resDiv.innerHTML = ""; totalFound = 0;
            progress.style.width = "0%";
            progress.style.background = mode === 'steady' ? 'var(--steady)' : (mode === 'pump' ? 'var(--pump)' : 'var(--accent)');
            
            let currentIdx = 0;
            while (totalFound < 50 && currentIdx < 1500) {
                status.innerText = `Searching... Found ${totalFound}/50`;
                try {
                    const response = await fetch(`/api/scan?start=${currentIdx}&end=${currentIdx + 50}&mode=${mode}`);
                    const data = await response.json();
                    if (data.length > 0) { renderResults(data, false, mode); totalFound += data.length; }
                    currentIdx += 50;
                    progress.style.width = (totalFound / 50 * 100) + "%";
                } catch (e) { break; }
            }
            status.innerText = "Scan Complete.";
        }

        async function manualScan() {
            const sym = document.getElementById('symbolInput').value.trim();
            if(!sym) return;
            const response = await fetch(`/api/scan?symbol=${sym}`);
            const data = await response.json();
            renderResults(data, true);
        }

        function renderResults(data, prepend = false, currentMode) {
            const resDiv = document.getElementById('results');
            data.forEach(coin => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => loadChart(coin.symbol, div, currentMode);
                
                let sColor = coin.strength > 75 ? '#00ff88' : (coin.strength > 40 ? '#ffaa00' : '#ff4444');

                let html = `
                    <div style="display:flex; justify-content:space-between; font-weight:800; font-size:16px"><span>${coin.symbol}</span><span>$${coin.price}</span></div>
                    <div class="metrics-row"><span>Vol: <b>${coin.volatility}</b></span><span>MF: <b>${coin.adScore}</b></span></div>
                    <div style="font-size:11px; font-weight:800; color:var(--text-main)">STRENGTH <span>${coin.strength}%</span></div>
                    <div class="strength-bar-bg"><div style="height:100%; width:${coin.strength}%; background:${sColor}"></div></div>
                    <span class="badge" style="background:${coin.color}; color:#000">${coin.status}</span>
                `;

                if (coin.steadyHours) {
                    html += `<div class="steady-report"><span class="steady-val">⏱️ ${coin.steadyHours} HOURS</span>Since Peak/Floor</div>`;
                } else if (coin.modeData?.isPump) {
                    html += `<div class="extra-data" style="color:var(--pump); border-color:var(--pump)">🚀 20D HIGH REACHED <br><small>${coin.modeData.peak} Days Ago</small></div>`;
                } else if (coin.plan.stop !== "N/A") {
                    html += `<div class="plan-grid"><div class="plan-item">Entry<b>${coin.plan.entry}</b></div><div class="plan-item" style="border-left:3px solid var(--danger); padding-left:8px">Stop<b>${coin.plan.stop}</b></div><div class="plan-item" style="border-left:3px solid var(--accent); padding-left:8px">TP1<b>${coin.plan.tp1}</b></div><div class="plan-item" style="border-left:3px solid var(--accent); padding-left:8px">TP2<b>${coin.plan.tp2}</b></div></div>`;
                }

                div.innerHTML = html + `<div class="conclusion"><b>Verdict:</b> ${coin.explanation}</div>`;
                if(prepend) resDiv.prepend(div); else resDiv.appendChild(div);
            });
        }

        function loadChart(symbol, element, mode) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            const interval = mode === 'steady' ? "60" : "D";
            new TradingView.widget({ "autosize": true, "symbol": "MEXC:" + symbol + "USDT.P", "interval": interval, "theme": THEME, "style": "1", "container_id": "chart-container" });
        }
    </script>
</body>
</html>
